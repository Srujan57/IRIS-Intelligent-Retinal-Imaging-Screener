# Data
data_dir: data/
labels_csv: data/labels.csv
splits_csv: data/splits.csv

# Image Processing
image_size: 224
normalize_mean: 0.5
normalize_std: 0.5

# Retinal Layers to Segment
layers:
  - RNFL       # retinal nerve fiber layer
  - GCL        # ganglion cell layer
  - macular    # macular thickness
  - choroidal  # choroidal thickness

# Classes
classes:
  - healthy
  - eating_disorder_pattern

# Training
epochs: 50
batch_size: 16
learning_rate: 0.0001
val_split: 0.15
test_split: 0.15
seed: 42

# Model
segmentation_model: unet
classification_model: classifier
quantization: true
bit_width: 8

# Output
save_dir: experiments/
kaggle_output_dir: /kaggle/working/experiments/
